name: Frontend CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./laundry-santuy-frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./laundry-santuy-frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./laundry-santuy-frontend
        run: npm run build